services:
  postgres:
    image: postgres:15-alpine
    container_name: sports_academy_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-sports_academy_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sports_academy_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sports_academy_network

  redis:
    image: redis:7-alpine
    container_name: sports_academy_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sports_academy_network

  minio:
    image: minio/minio:latest
    container_name: sports_academy_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sports_academy_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports_academy_backend
    command: python run_gunicorn.py
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    environment:
      # Application
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      LANGUAGE_CODE: ${LANGUAGE_CODE:-en-us}
      USE_TZ: ${USE_TZ:-True}
      
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-sports_academy_dev}}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sports_academy_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-3600}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800}
      JWT_ISSUER: ${JWT_ISSUER:-sports-academy}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-sports-academy-api}
      
      # Storage (MinIO)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-minioadmin}}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-sports-academy-media}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_USE_SSL: ${AWS_S3_USE_SSL:-False}
      AWS_DEFAULT_ACL: ${AWS_DEFAULT_ACL:-private}
      
      # Celery
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      CELERY_TASK_SERIALIZER: ${CELERY_TASK_SERIALIZER:-json}
      CELERY_RESULT_SERIALIZER: ${CELERY_RESULT_SERIALIZER:-json}
      CELERY_ACCEPT_CONTENT: ${CELERY_ACCEPT_CONTENT:-["json"]}
      CELERY_TIMEZONE: ${CELERY_TIMEZONE:-UTC}
      
      # Email (Development - Console Backend)
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sports_academy_network
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports_academy_celery_worker
    command: python run_celery.py -A celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    environment:
      # Application
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-sports_academy_dev}}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sports_academy_dev}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      
      # Storage (MinIO)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-minioadmin}}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-sports-academy-media}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      AWS_S3_USE_SSL: ${AWS_S3_USE_SSL:-False}
      
      # Celery
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      CELERY_TASK_SERIALIZER: ${CELERY_TASK_SERIALIZER:-json}
      CELERY_RESULT_SERIALIZER: ${CELERY_RESULT_SERIALIZER:-json}
      CELERY_ACCEPT_CONTENT: ${CELERY_ACCEPT_CONTENT:-["json"]}
      CELERY_TIMEZONE: ${CELERY_TIMEZONE:-UTC}
      
      # Email
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - sports_academy_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: sports_academy_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_APP_NAME: ${VITE_APP_NAME:-Sports Academy}
      VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
      VITE_ENVIRONMENT: ${VITE_ENVIRONMENT:-development}
    depends_on:
      backend:
        condition: service_started
    networks:
      - sports_academy_network
    restart: unless-stopped

volumes:
  postgres_data:
    name: sports_academy_postgres_data
  redis_data:
    name: sports_academy_redis_data
  minio_data:
    name: sports_academy_minio_data
  backend_static:
    name: sports_academy_backend_static
  backend_media:
    name: sports_academy_backend_media

networks:
  sports_academy_network:
    name: sports_academy_network
    driver: bridge
